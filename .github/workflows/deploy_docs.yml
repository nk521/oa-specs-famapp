name: Deploy OpenAPI Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4

      - name: Install dependencies
        run: pdm install

      - name: Export OpenAPI JSON
        run: |
          pdm run python -c "
          import json
          from main import app
          with open('openapi.json', 'w') as f:
              json.dump(app.openapi(), f)
          "

      - name: Generate Static Docs Folders
        run: |
          mkdir -p public/redoc
          mkdir -p public/docs

          # 1. Generate Redoc
          npx @redocly/cli build-docs openapi.json -o public/redoc/index.html

          # 2. Generate Swagger UI
          pdm run python -c "
          from fastapi.openapi.docs import get_swagger_ui_html
          import os
          html = get_swagger_ui_html(
              openapi_url='../openapi.json',
              title='API Docs - Swagger'
          )
          with open('public/docs/index.html', 'wb') as f:
              f.write(html.body)
          "

          # 3. Move JSON to root
          mv openapi.json public/

          # 4. Create the Landing Page with Buttons
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>FamApp Public API Documentation</title>
          </head>
          <body>
              <h1>FamApp API Specs</h1>
              <hr>
              <p>Select a documentation format:</p>
              <ul>
                  <li>
                      <a href="./docs/">Swagger UI (OpenAPI Docs)</a>
                  </li>
                  <li>
                      <a href="./redoc/">ReDoc View</a>
                  </li>
                  <li>
                      <a href="./openapi.json">Raw JSON</a>
                  </li>
              </ul>
              <hr>
              <address>Generated by GitHub Actions - $(date)</address>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: famapp.specs.nkmason.dev
