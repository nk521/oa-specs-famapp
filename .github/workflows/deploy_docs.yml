name: Deploy OpenAPI Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4

      - name: Install dependencies
        run: pdm install

      - name: Export OpenAPI JSON
        run: |
          pdm run python -c "
          import json
          from main import app
          with open('openapi.json', 'w') as f:
              json.dump(app.openapi(), f)
          "

      - name: Generate Static Docs Folders
        run: |
          mkdir -p public/elements
          mkdir -p public/swagger

          pdm run python -c "
          from fastapi.openapi.docs import get_swagger_ui_html
          import os
          html = get_swagger_ui_html(
              openapi_url='../openapi.json',
              title='FamApp API Docs - Swagger'
          )
          with open('public/swagger/index.html', 'wb') as f:
              f.write(html.body)
          "

          cat <<EOF > public/elements/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
              <title>FamApp API Docs - Elements</title>
              <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
              <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements/styles.min.css">
            </head>
            <body>
              <elements-api
                apiDescriptionUrl="../openapi.json"
                router="hash"
                layout="responsive"
              />
            </body>
          </html>
          EOF

          mv openapi.json public/

          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>FamApp Public API Documentation</title>
          </head>
          <body>
              <h1>FamApp API Specs</h1>
              <hr>
              <p>Select a documentation format:</p>
              <ul>
                  <li>
                      <a href="./swagger/">Swagger</a>
                  </li>
                  <li>
                      <a href="./elements/">Elements</a>
                  </li>
                  <li>
                      <a href="./openapi.json">Raw JSON</a>
                  </li>
              </ul>
              <hr>
              <address>Generated by GitHub Actions - $(date)</address>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: famapp.specs.nkmason.dev
